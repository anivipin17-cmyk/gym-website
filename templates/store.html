{% extends "base.html" %}
{% block content %}

<div class="store">
    <h2>🛒 Gym Store</h2>

    {% if products %}
        <div class="products-grid">
            {% for product in products %}
                <div class="product-card">
                    <h3>{{ product.name }}</h3>
                    <p>{{ product.description }}</p>
                    <p class="price">₹{{ product.price }}</p>
                    <a href="{{ url_for('store.buy', product_id=product.id) }}" class="btn btn-primary">Buy Now</a>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>No products available yet. Check back soon!</p>
    {% endif %}

    <br>
    <a href="{{ url_for('store.my_orders') }}" class="btn btn-outline">View My Orders</a>
</div>

{% endblock %}
