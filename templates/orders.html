{% extends "base.html" %}
{% block content %}

<div class="orders">
    <h2>📦 My Orders</h2>

    {% if orders %}
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                    <tr>
                        <td>{{ order.name }}</td>
                        <td>₹{{ order.price }}</td>
                        <td>{{ order.order_date }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>You haven't placed any orders yet.</p>
    {% endif %}
</div>

{% endblock %}
